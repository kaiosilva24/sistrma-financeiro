<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Financeiro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ===== LOGIN ===== */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #1e293b;
      border-radius: 16px;
      border: 1px solid #334155;
      padding: 40px;
      width: 420px;
      max-width: 92vw;
    }
    .logo { text-align: center; margin-bottom: 12px; }
    .logo svg { width: 52px; height: 52px; }
    .login-box h1 { text-align: center; margin-bottom: 6px; color: #818cf8; font-size: 24px; }
    .login-box .subtitle { text-align: center; color: #64748b; margin-bottom: 24px; font-size: 14px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #94a3b8; }
    .form-group input, .form-group select {
      width: 100%; padding: 12px 14px; border: 1px solid #334155;
      border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: 14px;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #6366f1; }
    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 15px; font-weight: 600; transition: all 0.2s; margin-top: 8px;
    }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-sm { width: auto; padding: 6px 14px; font-size: 13px; margin-top: 0; }
    .btn:disabled { background: #475569; cursor: not-allowed; }
    .error-msg {
      color: #f87171; font-size: 13px; text-align: center; margin-bottom: 12px;
      display: none; padding: 8px; background: rgba(239,68,68,0.1); border-radius: 8px;
    }
    .success-msg {
      color: #4ade80; font-size: 14px; text-align: center; padding: 10px;
      background: rgba(74,222,128,0.1); border-radius: 8px; margin-bottom: 12px; display: none;
    }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
      border-top-color: white; animation: spin 0.6s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== HEADER ===== */
    .header {
      background: #1e293b; border-bottom: 1px solid #334155;
      padding: 14px 24px; display: flex; justify-content: space-between; align-items: center;
    }
    .header h1 { font-size: 18px; color: #818cf8; }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .header-user { color: #94a3b8; font-size: 13px; margin-right: 8px; }

    /* ===== ADMIN PANEL ===== */
    .container { max-width: 900px; margin: 0 auto; padding: 24px; }
    .card {
      background: #1e293b; border-radius: 12px; border: 1px solid #334155;
      padding: 24px; margin-bottom: 24px;
    }
    .card h2 { font-size: 18px; margin-bottom: 16px; color: #818cf8; }
    .form-row { display: flex; gap: 16px; }
    .form-row .form-group { flex: 1; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #334155; }
    th { color: #94a3b8; font-weight: 500; font-size: 13px; text-transform: uppercase; }
    td { font-size: 14px; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: 12px; font-weight: 600;
    }
    .badge-admin { background: #312e81; color: #818cf8; }
    .badge-basic { background: #1e3a5f; color: #60a5fa; }
    .badge-active { background: #14532d; color: #4ade80; }
    .badge-disabled { background: #450a0a; color: #f87171; }
    .empty-state { text-align: center; padding: 40px; color: #64748b; }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #1e293b; border-radius: 12px; border: 1px solid #334155;
      padding: 24px; width: 460px; max-width: 90vw;
    }
    .modal h3 { font-size: 18px; margin-bottom: 16px; color: #818cf8; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 24px; right: 24px; padding: 12px 20px;
      border-radius: 8px; font-size: 14px; display: none; z-index: 1000;
      animation: slideIn 0.3s ease;
    }
    .toast-success { background: #14532d; color: #4ade80; border: 1px solid #166534; }
    .toast-error { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    .divider { border: none; border-top: 1px solid #334155; margin: 20px 0; }
  </style>
</head>
<body>

<!-- ============ SETUP VIEW ============ -->
<div id="setup-view" class="login-container" style="display:none">
  <div class="login-box">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1>Configuração Inicial</h1>
    <p class="subtitle">Crie a conta do administrador do sistema</p>
    <div id="setup-error" class="error-msg"></div>
    <div class="form-group">
      <label>Email do Administrador</label>
      <input type="email" id="setup-email" placeholder="admin@email.com">
    </div>
    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="setup-name" placeholder="Seu nome">
    </div>
    <div class="form-group">
      <label>Senha (mínimo 6 caracteres)</label>
      <input type="password" id="setup-password" placeholder="Crie uma senha forte">
    </div>
    <div class="form-group">
      <label>Confirmar Senha</label>
      <input type="password" id="setup-password2" placeholder="Repita a senha">
    </div>
    <button class="btn btn-primary" onclick="doSetup()">Criar e Entrar</button>
  </div>
</div>

<!-- ============ LOGIN VIEW ============ -->
<div id="login-view" class="login-container" style="display:none">
  <div class="login-box">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="18" rx="2"/><line x1="2" y1="9" x2="22" y2="9"/><line x1="9" y1="3" x2="9" y2="9"/>
      </svg>
    </div>
    <h1>Sistema Financeiro</h1>
    <p class="subtitle">Faça login com seu email e senha</p>
    <div id="login-error" class="error-msg"></div>
    <div id="login-success" class="success-msg"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-password" placeholder="Sua senha" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- ============ ADMIN PANEL ============ -->
<div id="admin-view" style="display:none">
  <div class="header">
    <h1>Painel Administrativo</h1>
    <div class="header-actions">
      <span class="header-user" id="admin-name"></span>
      <button class="btn btn-primary btn-sm" onclick="goToFinanceiro()">Meu Financeiro</button>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Sair</button>
    </div>
  </div>
  <div class="container">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 style="margin:0">Usuários</h2>
        <button class="btn btn-primary btn-sm" onclick="showRegisterModal()">+ Novo Usuário</button>
      </div>
      <div id="users-table"><div class="empty-state">Carregando...</div></div>
    </div>
  </div>
</div>

<!-- ============ REGISTER MODAL ============ -->
<div id="register-modal" class="modal-overlay">
  <div class="modal">
    <h3>Cadastrar Novo Usuário</h3>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="usuario@email.com">
    </div>
    <div class="form-group">
      <label>Nome de Exibição</label>
      <input type="text" id="reg-name" placeholder="Nome do usuário">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="form-group">
        <label>Perfil</label>
        <select id="reg-role">
          <option value="BASIC">Usuário</option>
          <option value="ADMIN">Administrador</option>
        </select>
      </div>
    </div>
    <div id="reg-error" class="error-msg"></div>
    <div style="display:flex;gap:12px;margin-top:16px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeRegisterModal()">Cancelar</button>
      <button class="btn btn-primary" style="flex:1" onclick="registerUser()">Cadastrar</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
  const API = '/email-auth';
  let currentToken = null;
  let currentUser = null;

  // ===== INIT =====
  (async function init() {
    try {
      const res = await fetch(`${API}/needs-setup`);
      const data = await res.json();
      if (data.needsSetup) {
        show('setup-view');
        return;
      }
    } catch(e) {}

    // Check stored session
    const saved = localStorage.getItem('sf-session');
    if (saved) {
      try {
        const session = JSON.parse(saved);
        currentToken = session.token;
        currentUser = session;
        if (session.role === 'ADMIN') {
          showAdmin();
        } else {
          goToFinanceiro();
        }
        return;
      } catch(e) { localStorage.removeItem('sf-session'); }
    }

    show('login-view');
  })();

  function show(id) {
    ['setup-view','login-view','admin-view'].forEach(v => {
      document.getElementById(v).style.display = 'none';
    });
    const el = document.getElementById(id);
    el.style.display = id.includes('login') || id.includes('setup') ? 'flex' : 'block';
  }

  // ===== SETUP =====
  async function doSetup() {
    const email = document.getElementById('setup-email').value;
    const displayName = document.getElementById('setup-name').value;
    const password = document.getElementById('setup-password').value;
    const password2 = document.getElementById('setup-password2').value;
    const err = document.getElementById('setup-error');
    err.style.display = 'none';

    if (!email || !password) { showErr(err, 'Preencha email e senha.'); return; }
    if (password.length < 6) { showErr(err, 'Senha deve ter no mínimo 6 caracteres.'); return; }
    if (password !== password2) { showErr(err, 'As senhas não coincidem.'); return; }

    try {
      const res = await fetch(`${API}/setup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, displayName })
      });
      const data = await res.json();
      if (data.status === 'ok') {
        saveSession(data.data.token, 'ADMIN', displayName || 'Administrador', email);
        showAdmin();
        showToast('Administrador criado com sucesso!', 'success');
      } else {
        showErr(err, errMsg(data.reason));
      }
    } catch(e) { showErr(err, 'Erro de conexão.'); }
  }

  // ===== LOGIN =====
  async function doLogin() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const err = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    err.style.display = 'none';

    if (!email || !password) { showErr(err, 'Preencha email e senha.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Entrando...';

    try {
      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (data.status === 'ok') {
        const { token, role, displayName, userId } = data.data;
        saveSession(token, role, displayName, email);

        if (role === 'ADMIN') {
          showAdmin();
        } else {
          goToFinanceiro();
        }
      } else {
        const msgs = {
          'invalid-credentials': 'Email ou senha incorretos.',
          'user-disabled': 'Sua conta está desativada.',
        };
        showErr(err, msgs[data.reason] || 'Erro ao fazer login.');
      }
    } catch(e) {
      showErr(err, 'Erro de conexão com o servidor.');
    }
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }

  function saveSession(token, role, displayName, email) {
    currentToken = token;
    currentUser = { token, role, displayName, email };
    localStorage.setItem('sf-session', JSON.stringify(currentUser));
  }

  function goToFinanceiro() {
    if (currentToken) {
      // Set token that Actual Budget uses internally
      localStorage.setItem('actualbudget-token', currentToken);
      // sf-session stays so index.html redirect check passes
    }
    window.location.href = '/';
  }

  function logout() {
    currentToken = null;
    currentUser = null;
    // Clear all auth data
    localStorage.removeItem('sf-session');
    localStorage.removeItem('actualbudget-token');
    // Clear any Actual Budget stored tokens
    var keys = Object.keys(localStorage);
    keys.forEach(function(k) {
      if (k.includes('token') || k.includes('Token') || k.includes('actual')) {
        localStorage.removeItem(k);
      }
    });
    show('login-view');
  }

  // ===== ADMIN PANEL =====
  function showAdmin() {
    show('admin-view');
    document.getElementById('admin-name').textContent = currentUser?.displayName || currentUser?.email || '';
    loadUsers();
  }

  async function loadUsers() {
    try {
      const res = await fetch(`${API}/users`, {
        headers: { 'x-actual-token': currentToken }
      });
      const data = await res.json();
      if (res.status === 401 || res.status === 403) { logout(); return; }

      if (data.status === 'ok' && data.data.length > 0) {
        let html = `<table><thead><tr>
          <th>Email</th><th>Nome</th><th>Perfil</th><th>Status</th><th>Ações</th>
        </tr></thead><tbody>`;
        data.data.forEach(u => {
          html += `<tr>
            <td>${u.email || u.user_name || '-'}</td>
            <td>${u.display_name || '-'}</td>
            <td><span class="badge ${u.role==='ADMIN'?'badge-admin':'badge-basic'}">${u.role==='ADMIN'?'Admin':'Usuário'}</span></td>
            <td><span class="badge ${u.enabled?'badge-active':'badge-disabled'}">${u.enabled?'Ativo':'Inativo'}</span></td>
            <td><button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">Excluir</button></td>
          </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('users-table').innerHTML = html;
      } else {
        document.getElementById('users-table').innerHTML = '<div class="empty-state">Nenhum usuário cadastrado</div>';
      }
    } catch(e) {
      document.getElementById('users-table').innerHTML = '<div class="empty-state">Erro ao carregar</div>';
    }
  }

  function showRegisterModal() {
    document.getElementById('register-modal').classList.add('active');
    document.getElementById('reg-error').style.display = 'none';
  }
  function closeRegisterModal() {
    document.getElementById('register-modal').classList.remove('active');
    ['reg-email','reg-name','reg-password'].forEach(id => document.getElementById(id).value = '');
  }

  async function registerUser() {
    const email = document.getElementById('reg-email').value;
    const displayName = document.getElementById('reg-name').value;
    const password = document.getElementById('reg-password').value;
    const role = document.getElementById('reg-role').value;
    const err = document.getElementById('reg-error');

    try {
      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-actual-token': currentToken },
        body: JSON.stringify({ email, password, displayName, role })
      });
      const data = await res.json();
      if (data.status === 'ok') {
        showToast('Usuário cadastrado!', 'success');
        closeRegisterModal();
        loadUsers();
      } else {
        showErr(err, errMsg(data.reason));
      }
    } catch(e) { showErr(err, 'Erro de conexão.'); }
  }

  async function deleteUser(id) {
    if (!confirm('Deseja realmente excluir este usuário?')) return;
    try {
      const res = await fetch(`${API}/users/${id}`, {
        method: 'DELETE',
        headers: { 'x-actual-token': currentToken }
      });
      const data = await res.json();
      if (data.status === 'ok') {
        showToast('Usuário excluído.', 'success');
        loadUsers();
      } else { showToast('Erro ao excluir.', 'error'); }
    } catch(e) { showToast('Erro de conexão.', 'error'); }
  }

  // ===== HELPERS =====
  function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }
  function errMsg(reason) {
    const m = {
      'email-already-exists': 'Este email já está cadastrado.',
      'email-and-password-required': 'Email e senha são obrigatórios.',
      'password-too-short': 'Senha deve ter no mínimo 6 caracteres.',
      'invalid-email': 'Email inválido.',
      'setup-already-done': 'Setup já foi realizado.',
      'invalid-credentials': 'Email ou senha incorretos.',
    };
    return m[reason] || 'Erro inesperado.';
  }
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast toast-${type}`; t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('login-view').style.display !== 'none') doLogin();
    if (document.getElementById('setup-view').style.display !== 'none') doSetup();
  });
</script>
</body>
</html>
