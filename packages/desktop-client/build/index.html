    <script>
      (function() {
        var ROTAS_BLOQUEADAS = ['/login', '/bootstrap', '/config-server'];
        var _redirecionando = false;

        function eRotaBloqueada(p) {
          for (var i = 0; i < ROTAS_BLOQUEADAS.length; i++) {
            if (p === ROTAS_BLOQUEADAS[i] || p.startsWith(ROTAS_BLOQUEADAS[i] + '/')) {
              return true;
            }
          }
          return false;
        }

        function bloquearSeNecessario(limparSessao) {
          if (_redirecionando) return false;
          var p = window.location.pathname;
          if (eRotaBloqueada(p)) {
            _redirecionando = true;
            if (limparSessao) localStorage.removeItem('sf-session');
            window.location.replace('/entrar');
            return true;
          }
          return false;
        }

        // 1) Bloqueio imediato para hard navigation direta a rota bloqueada
        if (bloquearSeNecessario(true)) return;

        // 2) Sem sessao? Vai para /entrar
        if (!localStorage.getItem('sf-session')) {
          window.location.replace('/entrar');
          return;
        }

        // 3) SEM interceptores pushState/replaceState - o React os usa durante boot
        //    causando loop infinito. O polling abaixo e suficiente.

        // 4) Polling apos 10s de graca para o React completar o boot e validar token
        setTimeout(function() {
          _redirecionando = false;
          setInterval(function() { bloquearSeNecessario(true); }, 1000);
        }, 10000);
      })();
    </script>
    <script src="/auth-guard.js"></script>
