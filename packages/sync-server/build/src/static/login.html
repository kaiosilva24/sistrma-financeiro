<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema Financeiro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #1e293b;
      border-radius: 16px;
      border: 1px solid #334155;
      padding: 40px;
      width: 400px;
      max-width: 90vw;
    }
    .logo {
      text-align: center;
      margin-bottom: 8px;
    }
    .logo svg { width: 48px; height: 48px; }
    h1 { text-align: center; margin-bottom: 8px; color: #818cf8; font-size: 24px; }
    .subtitle { text-align: center; color: #64748b; margin-bottom: 24px; font-size: 14px; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #94a3b8;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #6366f1;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      background: #6366f1;
      color: white;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { background: #475569; cursor: not-allowed; }
    .error-msg {
      color: #f87171;
      font-size: 13px;
      text-align: center;
      margin-bottom: 12px;
      display: none;
      padding: 8px;
      background: rgba(239,68,68,0.1);
      border-radius: 8px;
    }
    .links {
      text-align: center;
      margin-top: 16px;
    }
    .links a {
      color: #64748b;
      text-decoration: none;
      font-size: 13px;
    }
    .links a:hover { color: #818cf8; }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success-msg {
      color: #4ade80;
      font-size: 14px;
      text-align: center;
      padding: 12px;
      background: rgba(74,222,128,0.1);
      border-radius: 8px;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="18" rx="2"/>
        <line x1="2" y1="9" x2="22" y2="9"/>
        <line x1="9" y1="3" x2="9" y2="9"/>
      </svg>
    </div>
    <h1>Sistema Financeiro</h1>
    <p class="subtitle">Faça login para acessar sua conta</p>

    <div id="error-msg" class="error-msg"></div>
    <div id="success-msg" class="success-msg"></div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="Sua senha" autocomplete="current-password">
    </div>

    <button class="btn" id="login-btn" onclick="doLogin()">Entrar</button>

    <div class="links">
      <a href="/admin-panel">Painel Administrativo</a>
    </div>
  </div>

  <script>
    // Check if already logged in
    const existingToken = localStorage.getItem('user-token');
    if (existingToken) {
      window.location.href = '/';
    }

    async function doLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');
      const btn = document.getElementById('login-btn');

      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      if (!email || !password) {
        errorEl.textContent = 'Preencha email e senha.';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Entrando...';

      try {
        const res = await fetch('/email-auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.status === 'ok') {
          // Store token for Actual Budget app
          localStorage.setItem('user-token', data.data.token);
          // Also set the token that Actual Budget uses internally
          try {
            const keys = Object.keys(localStorage);
            for (const key of keys) {
              if (key.includes('token') || key.includes('Token')) {
                // Don't overwrite admin-token
                if (key !== 'admin-token') {
                  localStorage.setItem(key, data.data.token);
                }
              }
            }
          } catch(e) {}

          successEl.textContent = `Bem-vindo, ${data.data.displayName}!`;
          successEl.style.display = 'block';

          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        } else {
          const msgs = {
            'invalid-credentials': 'Email ou senha incorretos.',
            'user-disabled': 'Sua conta está desativada.',
            'email-and-password-required': 'Preencha email e senha.',
          };
          errorEl.textContent = msgs[data.reason] || 'Erro ao fazer login.';
          errorEl.style.display = 'block';
        }
      } catch (e) {
        errorEl.textContent = 'Erro de conexão com o servidor.';
        errorEl.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'Entrar';
    }

    // Enter key support
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });
  </script>
</body>
</html>
